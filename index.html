<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My E-Commerce Website for Small Business</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1506748686214-3f8c1e3eaf7f') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }
    header {
      background: rgba(0, 100, 0, 0.9);
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      text-shadow: 2px 2px 4px #000;
    }
    nav {
      background: rgba(34, 139, 34, 0.9);
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      text-align: center;
      margin-top: 50px;
    }
    .card {
      background: rgba(0,0,0,0.6);
      display: inline-block;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    h1 {
      margin-bottom: 20px;
      font-size: 2em;
    }
    button {
      margin: 10px;
      padding: 12px 24px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: rgba(0, 100, 0, 0.8);
      color: #fff;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: rgba(34, 139, 34, 0.9);
    }
    #userInfo {
      margin-top: 20px;
      text-align: left;
    }
    img {
      border-radius: 50%;
      margin-top: 10px;
    }
    footer {
      background: rgba(0, 100, 0, 0.9);
      text-align: center;
      padding: 15px;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>My E-Commerce Website for Small Business</header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Login</a>
  </nav>

  <div class="container">
    <div class="card">
      <h1>Login</h1>
      <button id="googleLogin">Login with Google</button>
      <button id="facebookLogin">Login with Facebook</button>
      <button id="logout">Logout</button>
      <div id="userInfo"></div>
    </div>
  </div>

  <footer>&copy; 2026 My E-Commerce Website for Small Business</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup, signOut } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARn2bGBV7ojBZC-axw5zEiPtGWmp_Mstw",
      authDomain: "mywebsite-d9aee.firebaseapp.com",
      projectId: "mywebsite-d9aee",
      storageBucket: "mywebsite-d9aee.firebasestorage.app",
      messagingSenderId: "1068578461796",
      appId: "1:1068578461796:web:4d0c26038872f7ceb4e771",
      measurementId: "G-NRY7QVZBV2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Google Login
    document.getElementById("googleLogin").addEventListener("click", () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(result => {
          showUser(result.user);
          // Redirect to home.html after successful login
          window.location.href = "home.html";
        })
        .catch(error => alert("Google login error: " + error.message));
    });

    // Facebook Login
    document.getElementById("facebookLogin").addEventListener("click", () => {
      const provider = new FacebookAuthProvider();
      signInWithPopup(auth, provider)
        .then(result => {
          showUser(result.user);
          // Redirect to home.html after successful login
          window.location.href = "home.html"; 
        })
        .catch(error => alert("Facebook login error: " + error.message));
    });

    document.getElementById("logout").addEventListener("click", () => {
      signOut(auth).then(() => {
        document.getElementById("userInfo").innerHTML = "";
        alert("Logged out successfully!");
      });
    });

    function showUser(user) {
      document.getElementById("userInfo").innerHTML = `
        <p><strong>Name:</strong> ${user.displayName}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <img src="${user.photoURL}" alt="Profile Picture" width="100" />
      `;
    }
  </script>


</body>
</html>
