<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile - PandanCraft</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #profile {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      text-align: center;
    }
    #profile img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin-bottom: 15px;
      object-fit: cover;
    }
    #profile h2 {
      color: #2e7d32;
      margin-bottom: 10px;
    }
    #profile p {
      margin: 6px 0;
    }
    #profile button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #profile button:hover {
      background: #1b5e20;
    }
  </style>
</head>
<body>
  <header>
    <h1>PandanCraft</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="profile.html">👤</a>
    </nav>
  </header>
<section id="profile">
  <h2>User Profile</h2>
  <!-- Totoong picture mo -->
  <img src="ortega.jpg" alt="Judy Mae">

  <p><strong>Name:</strong> Judy Mae</p>
  <p><strong>Email:</strong> judymaeorteza24@gmail.com</p>
  <p><strong>About Me:</strong> 20 years old.</p>

  <!-- Clickable Logout -->
  <button onclick="logout()">Logout</button>
</section>

<script type="module">
  import { auth } from "./firebase-config.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // Gumagawa ng logout function
  window.logout = async function() {
    try {
      // Firebase sign out
      await signOut(auth);
      alert("✅ Logged out!");
      // Redirect sa login screen (yung second page na pinakita mo)
      window.location.href = "login.html";
    } catch (error) {
      alert("❌ " + error.message);
    }
  }
</script>

</body>
</html>
