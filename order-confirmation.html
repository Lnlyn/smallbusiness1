<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Confirmation</title>
<style>
  body { font-family: Arial; background: #f6f6f6; padding: 20px; }
  .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
  .item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
  .item img { width: 70px; border-radius: 8px; }
  .summary { margin-top: 20px; text-align: right; }
  .confirm-btn { background: green; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<h1 style="text-align:center;">Order Confirmation</h1>
<div class="container">
  <div id="order-summary"></div>
  <div class="summary">
    <h3 id="total-price">Total: ₱0</h3>
    <button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>
  </div>
</div>

<script>
function renderOrder() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("order-summary");
  let total = 0;

  if (!cart.length) {
    container.innerHTML = "<p>No order found.</p>";
    return;
  }

  cart.forEach(item => {
    const subtotal = item.price * item.qty;
    total += subtotal;
    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <div>
          <strong>${item.name}</strong><br>
          Price: ₱${item.price}<br>
          Qty: ${item.qty}<br>
          Subtotal: ₱${subtotal}
        </div>
      </div>
    `;
  });

  document.getElementById("total-price").textContent = "Total: ₱" + total;
}

function confirmOrder() {
  alert("Order confirmed! Thank you for shopping.");
  localStorage.removeItem("cart");
  window.location.href = "thankyou.html";
}

renderOrder();
</script>
</body>
</html>
