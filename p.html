<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eco Pamaypay - My E-Commerce Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My E-Commerce Website</h1>
    <div class="top-icons">
      <a href="home.html">🏠</a>
      <a href="cart.html">🛒</a>
      <a href="#">👤</a>
    </div>
  </header>

  <nav>
    <a href="home.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="index.html">Logout</a>
  </nav>

  <div class="product-detail">
    <img src="assets/images/product/p.jpg" alt="Big Pandan Bag">
    <h2>Big Pandan Bag</h2>
    <p>Handmade eco-friendly fan, perfect for hot days.</p>
    <span>₱150</span>

    <!-- Add to Cart button -->
    <button onclick="addToCart('Big Pandan Bag', 150, 'assets/images/product/p.jpg')">
      Add to Cart
    </button>

    <!-- Checkout button -->
    <button onclick="goToCheckout()">
      Checkout
    </button>
  </div>

  <!-- Link to script.js -->
  <script src="script.js"></script>

  <!-- Inline script for checkout redirect -->
  <script>
    function goToCheckout() {
      window.location.href = "checkout.html";
    }
  </script>
</body>
</html>
