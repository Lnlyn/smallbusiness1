<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f6f6f6;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .cart-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
    padding: 15px 0;
  }

  .item img {
    width: 70px;
    border-radius: 8px;
  }

  .item-info {
    flex: 1;
    margin-left: 15px;
  }

  .qty-box {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .qty-box button {
    padding: 5px 10px;
    border: none;
    background: #333;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  .qty-number {
    font-weight: bold;
    min-width: 25px;
    text-align: center;
  }

  .summary {
    margin-top: 20px;
    padding: 15px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .checkout-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }

  .clear-btn {
    background: #c0392b;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

</style>
</head>

<body>

<h1>Your Cart</h1>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <h3>Total Items: <span id="cart-count">0</span></h3>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
  </div>

  <!-- CART ITEMS -->
  <div class="cart-box" id="cart-items"></div>

  <!-- SUMMARY -->
  <div class="summary">
    <h3 id="cart-total">Total Price: ₱0</h3>
    <h4 id="cart-total-items">Total Items: 0</h4>

    <button class="checkout-btn" onclick="goToCheckout()">
      Proceed to Checkout
    </button>
  </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function toNumber(v) {
  return Number(v) || 0;
}

/* SAMPLE */
function addSample() {
  let existing = cart.find(i => i.name === "Tampi Hat");

  if (existing) {
    existing.qty = toNumber(existing.qty) + 1;
  } else {
    cart.push({
      name: "Tampi Hat",
      price: 300,
      image: "assets/images/product/a.jpg",
      qty: 1
    });
  }

  save();
}

/* RENDER */
function renderCart() {
  const container = document.getElementById("cart-items");
  const totalDiv = document.getElementById("cart-total");
  const totalItemsDiv = document.getElementById("cart-total-items");

  container.innerHTML = "";
  let total = 0;

  if (!cart.length) {
    container.innerHTML = "<p style='text-align:center;'>Your cart is empty.</p>";
    totalDiv.innerHTML = "Total Price: ₱0";
    totalItemsDiv.innerHTML = "Total Items: 0";
    updateCartCount();
    return;
  }

  cart.forEach((item, index) => {

    let price = toNumber(item.price);
    let qty = toNumber(item.qty);
    let subtotal = price * qty;

    total += subtotal;

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        
        <div class="item-info">
          <strong>${item.name}</strong><br>
          Price: ₱${price}<br>
          Subtotal: ₱${subtotal}
        </div>

        <div class="qty-box">
          <button onclick="decrease(${index})">−</button>
          <span class="qty-number">${qty}</span>
          <button onclick="increase(${index})">+</button>
        </div>
      </div>
    `;
  });

  totalDiv.innerHTML = "Total Price: ₱" + total;

  let totalQty = cart.reduce((s, i) => s + toNumber(i.qty), 0);
  totalItemsDiv.innerHTML = "Total Items: " + totalQty;

  updateCartCount();
}

/* INCREASE */
function increase(i) {
  cart[i].qty = toNumber(cart[i].qty) + 1;
  save();
}

/* DECREASE */
function decrease(i) {
  let qty = toNumber(cart[i].qty);

  if (qty > 1) {
    cart[i].qty = qty - 1;
  } else {
    cart.splice(i, 1);
  }

  save();
}

/* CLEAR */
function clearCart() {
  if (confirm("Clear cart?")) {
    cart = [];
    localStorage.removeItem("cart");
    renderCart();
  }
}

/* SAVE */
function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* COUNT */
function updateCartCount() {
  let totalQty = cart.reduce((s, i) => s + toNumber(i.qty), 0);
  document.getElementById("cart-count").textContent = totalQty;
}

/* CHECKOUT */
function goToCheckout() {
  if (!cart.length) {
    alert("Your cart is empty.");
    return;
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "checkout.html";
}

/* INIT */
renderCart();

</script>

</body>
</html>
